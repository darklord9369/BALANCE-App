<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BALANCE - Log Meal</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="screen-card">
      <div class="screen-header">
        <div class="topbar">
          <button id="logoutBtn">Logout</button>
        </div>
        <h1 id="pageTitle">Log Meal</h1>
        <p>Choose a fueling option that matches your day.</p>
      </div>

      <div id="statusMessage" class="success-box" style="display:none;"></div>

      <form id="mealForm" class="form-stack">
        <div>
          <label for="mealCategoryId">Meal Category</label>
          <select id="mealCategoryId" required>
            <option value="">Select meal category</option>
          </select>
        </div>

        <div>
          <label>Selected Date</label>
          <input id="selectedDateDisplay" type="text" readonly />
        </div>

        <div>
          <label for="mealTime">Meal Time</label>
          <select id="mealTime" required>
            <option value="">Select meal time</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Snack">Snack</option>
          </select>
        </div>

        <div>
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Optional notes"></textarea>
        </div>

        <button id="submitBtn" type="submit">Save Meal</button>
      </form>

      <div class="toolbar equal-actions">
        <a class="button-link btn-outline-link" href="./dashboard.html">Back to Dashboard</a>
        <a id="backToEntriesLink" class="button-link btn-secondary-link" href="./meal-entries.html">Back to Entries</a>
      </div>
    </section>
  </main>

  <script type="module" src="./js/meal.js"></script>
</body>
</html>
