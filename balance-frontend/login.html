<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Fitness Planner</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="screen-card">
      <div class="screen-header">
        <h1>BALANCE - Fitness Planner</h1>
        <p id="authPageSubtitle">Log in to continue.</p>
      </div>
  
      <div id="statusMessage" class="status-banner" style="display:none;"></div>
  
      <!-- LOGIN CARD -->
      <section id="loginCard" class="info-card auth-card">
        <h2>Login</h2>
  
        <form id="loginForm" class="form-stack">
          <div>
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" required />
          </div>
  
          <div>
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" required />
          </div>
  
          <button type="submit">Login</button>
        </form>
  
        <p class="auth-switch-text">
          New user?
          <button id="showRegisterBtn" type="button" class="text-link-btn">
            Create Account
          </button>
        </p>
      </section>
  
      <!-- REGISTER CARD -->
      <section id="registerCard" class="info-card auth-card hidden">
        <h2>Create Account</h2>
  
        <form id="registerForm" class="form-stack">
          <div>
            <label for="registerFirstName">First Name</label>
            <input id="registerFirstName" type="text" required />
          </div>
  
          <div>
            <label for="registerLastName">Last Name</label>
            <input id="registerLastName" type="text" />
          </div>
  
          <div>
            <label for="registerEmail">Email</label>
            <input id="registerEmail" type="email" required />
          </div>
  
          <div>
            <label for="registerPassword">Password</label>
            <input id="registerPassword" type="password" required />
          </div>
  
          <button type="submit">Create Account</button>
        </form>
  
        <p class="auth-switch-text">
          Already have an account?
          <button id="showLoginBtn" type="button" class="text-link-btn">
            Login
          </button>
        </p>
      </section>
    </section>
  </main>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
